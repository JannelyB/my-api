<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <title>Index</title>
</head>
<body>  
    <h1>Revisa la consola (F12)</h1>
    <script>
        (async () => {
            try {
                const response = await fetch('http://localhost:3000/api/v1/products'); 
                const data = await response.json(); 
                console.log("Datos recibidos:", data); 
            } catch (error) {
                console.error("Error en la petición:", error);
            }
        })();
    </script>
</body>
</html>
