version: '4.65.0'

services:
  postgres:
    image: postgres:15.3
    container_name: postgres
    environment:
      POSTGRES_USER: jlbarreto
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: my_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: